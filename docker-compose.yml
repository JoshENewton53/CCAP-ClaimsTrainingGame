version: '3.8'
services:
  backend:
    image: python:3.11-slim
    container_name: ccap_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./ai_models:/ai_models
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install -r requirements.txt || true && python app.py"
    restart: unless-stopped

# Frontend will run locally with `npm start` during development.
